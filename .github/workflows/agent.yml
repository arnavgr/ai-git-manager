name: Gemini Coding Agent
on:
  repository_dispatch:
    types: [ai_cmd]

jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    
    steps:
      - name: Notify KV - Processing
        run: |
          # Clean URL - no brackets
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -d "⏳ 2/4: Reading codebase..."

      - name: Checkout Manager (For Rules)
        uses: actions/checkout@v4
        
      - name: Checkout Target Repo
        run: |
          # Wrapped in quotes to prevent syntax errors
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.event.client_payload.repo }}" target
          cd target
          git checkout "${{ github.event.client_payload.branch }}" || git checkout -b "${{ github.event.client_payload.branch }}"

      - name: Setup Node & Install Gemini CLI
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/gemini-cli

      - name: Execute Agentic Changes
        env:
          USER_PROMPT: ${{ github.event.client_payload.prompt }}
        run: |
          # READ RULES HERE (in the root directory)
          RULES=$(cat gemini.md)
          
          cd target
          
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: Generating and applying patches..."

          # Bundle codebase (Context Diet)
          echo "Building codebase context..."
          touch codebase_context.txt
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.md" \) \
            -not -path "*/\.git/*" -not -path "*/node_modules/*" | while read -r f; do
            if [[ "$f" == *"package-lock.json"* ]]; then continue; fi
            echo "==== FILE: $f ====" >> codebase_context.txt
            cat "$f" >> codebase_context.txt
            echo "" >> codebase_context.txt
          done
          CODEBASE=$(cat codebase_context.txt)
          rm codebase_context.txt

          # Run Gemini
          gemini --skip-trust --yolo -m gemini-3.1-flash-lite \
          -p "$RULES 
          --- CODEBASE --- 
          $CODEBASE 
          --- USER PROMPT --- 
          $USER_PROMPT" > ../execute_changes.sh
          
          cd ..
          sed -i '/^```/d' execute_changes.sh
          
          echo "--- Generated Script ---"
          cat execute_changes.sh
          
          cd target
          bash ../execute_changes.sh || { echo "EXEC_FAIL=true" >> $GITHUB_ENV; exit 1; }

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "Gemini Agent"
          git config user.email "agent@arnavgr.com"
          
          if [ -f commit_msg.txt ]; then
            COMMIT_MSG=$(cat commit_msg.txt)
          else
            COMMIT_MSG="AI Update: Codebase modified."
          fi
          
          rm -f *.orig *.rej temp.patch commit_msg.txt ../execute_changes.sh
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "FINAL_MSG=❌ Finished: No code changes were made." >> $GITHUB_ENV
          else
            git commit -m "$COMMIT_MSG"
            git push origin "${{ github.event.client_payload.branch }}"
            echo "FINAL_MSG=✅ Done: Changes pushed to ${{ github.event.client_payload.branch }}." >> $GITHUB_ENV
          fi 

      - name: Final KV Status Update
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
             STATUS_MSG="${FINAL_MSG:-✅ Done: Job completed successfully.}"
          else
             STATUS_MSG="❌ Failed: The agent crashed or patch failed. Check GH logs."
          fi
          
          TARGET_URL="[https://api.cloudflare.com/client/v4/accounts/$](https://api.cloudflare.com/client/v4/accounts/$){{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.KV_NAMESPACE_ID }}/values/agent_status"
          
          curl -g -s -X PUT "$TARGET_URL" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -d "$STATUS_MSG"
