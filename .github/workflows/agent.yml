name: Gemini Coding Agent
on:
  repository_dispatch:
    types: [ai_cmd]

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manager Repo
        uses: actions/checkout@v4
        # This checks out the private manager repo — agent.yml, gemini.md,
        # and coder.sh are all now available on the runner at ./

      - name: Checkout Target Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.event.client_payload.repo }} target

      - name: Run Coder Agent
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID:   ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:    ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: |
          MODE="${{ github.event.client_payload.mode }}"
          MODE="${MODE:-bash}"

          EXTRA_FLAGS=""
          [ "${{ github.event.client_payload.dryrun }}" = "1" ] && EXTRA_FLAGS="--dry-run"

          bash coder.sh \
            --repo-path ./target \
            --prompt "${{ github.event.client_payload.prompt }}" \
            --mode "$MODE" \
            --rules gemini.md \
            $EXTRA_FLAGS

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "Gemini Agent"
          git config user.email "agent@arnavgr.com"
          git add .

          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            BRANCH="${{ github.event.client_payload.branch }}"
            BRANCH="${BRANCH:-main}"
            git commit -m "AI Update: ${{ github.event.client_payload.prompt }}"
            git push origin HEAD:refs/heads/$BRANCH
          fi
