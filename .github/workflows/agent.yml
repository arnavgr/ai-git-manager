name: OpenClaude Coding Agent
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'User Prompt'
        required: true
        type: string
      repo:
        description: 'Target Repo'
        required: true
        type: string
      branch:
        description: 'Target Branch'
        required: false
        default: 'main'
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 20       
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      
      # 🚀 OpenClaude Native Gemini Setup
      CLAUDE_CODE_USE_GEMINI: 1
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite # Ensure you use the most capable Flash version

    steps:
      - name: Notify KV - Booting Agent
        run: |
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 2/4: Initializing OpenClaude agent..."

      - name: Checkout Target Repo
        run: |
          TARGET_REPO="${{ github.event.inputs.repo }}"
          TARGET_BRANCH="${{ github.event.inputs.branch }}"
          
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/$TARGET_REPO" target
          cd target
          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH"

      - name: Setup Node & Install OpenClaude
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @gitlawb/openclaude

      - name: Execute Agentic Changes
        env:
          USER_PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          cd target

          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: OpenClaude is actively refactoring codebase..."

          # 🚀 Run OpenClaude headlessly.
          # --dangerously-skip-permissions tells it not to wait for human Y/N terminal inputs
          openclaude -p "$USER_PROMPT" --dangerously-skip-permissions

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "OpenClaude Agent"
          git config user.email "agent@arnavgr.com"

          TARGET_BRANCH="${{ github.event.inputs.branch }}"

          # OpenClaude edits files directly, no cleanup scripts needed
          git add .

          if git diff-index --quiet HEAD; then
            echo "FINAL_MSG=❌ Finished: OpenClaude made no code changes." >> $GITHUB_ENV
          else
            git commit -m "AI Update: $USER_PROMPT"
            git push origin "$TARGET_BRANCH"
            echo "FINAL_MSG=✅ Done: Changes pushed to $TARGET_BRANCH." >> $GITHUB_ENV
          fi

      - name: Final KV Status Update
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_MSG="${FINAL_MSG:-✅ Done: Job completed successfully.}"
          else
            STATUS_MSG="❌ Failed: OpenClaude crashed. Check GH logs."
          fi

          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" -H "Authorization: Bearer $CF_API_TOKEN" -d "$STATUS_MSG"
