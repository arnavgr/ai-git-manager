name: Gemini Coding Agent
on:
  repository_dispatch:
    types: [ai_cmd]

jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    
    steps:
      - name: Notify KV - Processing
        run: |
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 2/4: Mapping codebase & Prompting Gemini..."

      - name: Checkout Manager (For Rules)
        uses: actions/checkout@v4
        
      - name: Checkout Target Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.event.client_payload.repo }} target
          cd target
          git checkout ${{ github.event.client_payload.branch }} || git checkout -b ${{ github.event.client_payload.branch }}

      - name: Setup Node & Install Gemini CLI
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/gemini-cli

      - name: Execute Agentic Changes
        env:
          USER_PROMPT: ${{ github.event.client_payload.prompt }}
        run: |
          RULES=$(cat gemini.md)
          
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: AI exploring codebase and patching..."

          cd target
          
          # Generate a lightweight map of the repository
          TREE=$(find . -type f -not -path "*/\.git/*" -not -path "*/node_modules/*" | sort)
          
          # Inject README for immediate context without requiring a tool call
          if [ -f README.md ]; then
            README_CONTENT=$(cat README.md)
          else
            README_CONTENT="No README found."
          fi

          # Run Gemini WITH agentic tools enabled
          gemini --skip-trust --yolo -m gemini-3.1-flash-lite \
          --tools run_shell_command,google_web_search \
          -p "$RULES 
          --- REPO MAP --- 
          $TREE 
          --- README CONTEXT ---
          $README_CONTENT
          --- USER PROMPT --- 
          $USER_PROMPT" > ../execute_changes.sh
          
          cd ..
          sed -i '/^```/d' execute_changes.sh
          
          echo "--- Generated Script ---"
          cat execute_changes.sh
          
          cd target
          # Apply the changes and catch failures
          bash ../execute_changes.sh || { echo "EXEC_FAIL=true" >> $GITHUB_ENV; exit 1; }

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "Gemini Agent"
          git config user.email "agent@arnavgr.com"
          
          rm -f *.orig *.rej
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "No changes made."
            echo "FINAL_MSG=❌ Finished: No code changes were made." >> $GITHUB_ENV
          else
            if [ -f commit_msg.txt ]; then
              COMMIT_MSG=$(cat commit_msg.txt)
              rm commit_msg.txt
            else
              COMMIT_MSG="AI Update: Codebase modified."
            fi
            
            git commit -m "$COMMIT_MSG"
            git push origin ${{ github.event.client_payload.branch }}
            
            echo "FINAL_MSG=✅ Done: Changes pushed to ${{ github.event.client_payload.branch }}." >> $GITHUB_ENV
          fi 

      - name: Final KV Status Update
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
             STATUS_MSG="${FINAL_MSG:-✅ Done: Job completed successfully.}"
          else
             STATUS_MSG="❌ Failed: The agent crashed or patch failed. Check GH logs."
          fi
          
          curl -g -s -X PUT "[https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status](https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status)" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "$STATUS_MSG"
