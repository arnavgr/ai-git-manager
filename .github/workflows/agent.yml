name: Gemini Coding Agent
on:
  repository_dispatch:
    types: [ai_cmd]

jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    
    steps:
      - name: Notify KV - Processing
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 2/4: Reading codebase & Prompting Gemini..."

      - name: Checkout Manager (For Rules)
        uses: actions/checkout@v4
        
      - name: Checkout Target Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.event.client_payload.repo }} target
          cd target
          git checkout ${{ github.event.client_payload.branch }} || git checkout -b ${{ github.event.client_payload.branch }}

      - name: Setup Node & Install Gemini CLI
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/gemini-cli

      - name: Execute Agentic Changes
        env:
          USER_PROMPT: ${{ github.event.client_payload.prompt }}
        run: |
          RULES=$(cat gemini.md)
          
          cd target
          
          # Bundle the entire codebase into one text block for context
          echo "Building codebase context..."
          touch codebase_context.txt
          for f in $(find . -type f -not -path "*/\.git/*" -not -path "*/node_modules/*" -not -name "codebase_context.txt"); do
            echo "==== FILE: $f ====" >> codebase_context.txt
            cat "$f" >> codebase_context.txt
            echo "" >> codebase_context.txt
          done
          
          CODEBASE=$(cat codebase_context.txt)
          rm codebase_context.txt

          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: Generating and applying patches..."

          # Run Gemini. We pipe the output directly to a shell script.
          gemini --skip-trust --yolo -m gemini-3.1-flash-lite-preview -p "$RULES 
          --- CODEBASE --- 
          $CODEBASE 
          --- USER PROMPT --- 
          $USER_PROMPT" > ../execute_changes.sh
          
          cd ..
          # Strip accidental markdown fences just in case the AI hallucinates them
          sed -i '/^```/d' execute_changes.sh
          
          echo "--- Generated Script ---"
          cat execute_changes.sh
          
          # Apply the changes
          cd target
          bash ../execute_changes.sh

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "Gemini Agent"
          git config user.email "agent@arnavgr.com"
          
          # 1. Clean up the backup files patch creates
          rm -f *.orig *.rej
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "No changes made."
          else
            git commit -m "AI Update: ${{ github.event.client_payload.prompt }}"
            git push origin HEAD
            
            # 2. Fix the curl command: Add -g (globoff) and remove outer brackets
            curl -g -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.KV_NAMESPACE_ID }}/values/agent_status" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -d "✅ Done: Changes pushed to main"
          fi 
