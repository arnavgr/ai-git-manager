name: Gemini Coding Agent
on:
  repository_dispatch:
    types: [ai_cmd]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'User Prompt'
        required: true
        type: string
      repo:
        description: 'Target Repo'
        required: true
        type: string
      branch:
        description: 'Target Branch'
        required: false
        default: 'main'
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15       # FIX 1: Prevent hung Gemini API calls eating your minutes forever
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}   # FIX 2: Use $CF_API_TOKEN everywhere, not ${{ secrets.* }} mid-script
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Notify KV - Processing
        run: |
          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 2/4: Reading codebase..."

      - name: Checkout Manager (For Rules)
        uses: actions/checkout@v4

      - name: Checkout Target Repo
        run: |
          # Use fallback logic to support both event types
          TARGET_REPO="${{ github.event.inputs.repo || github.event.client_payload.repo }}"
          TARGET_BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch }}"
          
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/$TARGET_REPO" target
          cd target
          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH"

      - name: Setup Node & Install Gemini CLI
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/gemini-cli

      - name: Execute Agentic Changes
        env:
          USER_PROMPT: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
        run: |
          RULES=$(cat gemini.md)
          cd target

          curl -g -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: Generating and applying patches..."

          touch codebase_context.txt
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.md" \) \
            -not -path "*/\.git/*" -not -path "*/node_modules/*" | while read -r f; do
            if [[ "$f" == *"package-lock.json"* ]]; then continue; fi
            echo "==== FILE: $f ====" >> codebase_context.txt
            cat "$f" >> codebase_context.txt
            echo "" >> codebase_context.txt
          done
          CODEBASE=$(cat codebase_context.txt)
          rm codebase_context.txt

          gemini --skip-trust --yolo -m gemini-3.1-flash-lite \
          -p "$RULES
          --- CODEBASE ---
          $CODEBASE
          --- USER PROMPT ---
          $USER_PROMPT" > ../execute_changes.sh

          cd ..

          # Step 1: strip markdown fences
          sed -i '/^```/d' execute_changes.sh
          # Step 2: drop every leading line until we hit a real shell command
          awk '
            !started && /^(cat |patch |echo |git |bash |cp |mv |mkdir |touch |sed |awk |find |rm |chmod |#!)/ { started=1 }
            started { print }
          ' execute_changes.sh > execute_changes_clean.sh
          mv execute_changes_clean.sh execute_changes.sh

          if grep -qE 'rm\s+-rf\s+[/~]|dd\s+if=|mkfs\.|:\(\)\{|\bsudo\b' execute_changes.sh; then
            echo "❌ SAFETY ABORT: Destructive command detected in generated script."
            cat execute_changes.sh
            exit 1
          fi

          echo "--- Generated Script ---"
          cat execute_changes.sh

          cd target
          bash -o pipefail ../execute_changes.sh

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "Gemini Agent"
          git config user.email "agent@arnavgr.com"

          if [ -f commit_msg.txt ]; then
            COMMIT_MSG=$(cat commit_msg.txt)
          else
            COMMIT_MSG="AI Update: Codebase modified."
          fi

          TARGET_BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch }}"

          rm -f *.orig *.rej temp.patch commit_msg.txt ../execute_changes.sh
          git add .

          if git diff-index --quiet HEAD; then
            echo "FINAL_MSG=❌ Finished: No code changes were made." >> $GITHUB_ENV
          else
            git commit -m "$COMMIT_MSG"
            git push origin "$TARGET_BRANCH"
            echo "FINAL_MSG=✅ Done: Changes pushed to $TARGET_BRANCH." >> $GITHUB_ENV
          fi

      - name: Final KV Status Update
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_MSG="${FINAL_MSG:-✅ Done: Job completed successfully.}"
          else
            STATUS_MSG="❌ Failed: The agent crashed or patch failed. Check GH logs."
          fi

          curl -g -s -X PUT "[https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status](https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status)" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "$STATUS_MSG"
