name: OpenClaude Coding Agent
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'User Prompt'
        required: true
        type: string
      repo:
        description: 'Target Repo'
        required: true
        type: string
      branch:
        description: 'Target Branch'
        required: false
        default: 'main'
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 20       
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      
      CLAUDE_CODE_USE_GEMINI: 1
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite
      
      USER_PROMPT: ${{ github.event.inputs.prompt }}
      TARGET_REPO: ${{ github.event.inputs.repo }}
      TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}

    steps:
      - name: Notify KV - Booting Agent
        run: |
          curl -g -s -o /dev/null -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 2/4: Initializing OpenClaude agent..."

      - name: Checkout Target Repo
        run: |
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/$TARGET_REPO" target
          cd target
          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH"

      - name: Setup Node & Install OpenClaude
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 🛠️ Upgraded to Node 22 to fix Firecrawl EBADENGINE warnings
          
      - name: Install & Patch OpenClaude
        run: |
          npm install -g @gitlawb/openclaude
          
          # 🛠️ The "Track and Patch" Method
          # Find the exact executable path, trace back to the actual library folder,
          # and inject the 1M token limit for 3.1-flash-lite wherever 1.5-flash exists.
          
          echo "Hunting for OpenClaude real installation path..."
          BIN_PATH=$(which openclaude)
          REAL_BIN=$(readlink -f "$BIN_PATH")
          PACKAGE_DIR=$(dirname $(dirname "$REAL_BIN"))
          
          echo "Package firmly located at: $PACKAGE_DIR"
          
          find "$PACKAGE_DIR" -type f -name "*.js" -exec grep -l "gemini-1.5-flash" {} \; | while read -r MODEL_FILE; do
            echo "Patching model metadata in: $MODEL_FILE"
            sed -i "s|gemini-1.5-flash|gemini-3.1-flash-lite', 'Gemini 3.1 Flash Lite', 1048576, 8192), googleModel('gemini-1.5-flash|g" "$MODEL_FILE"
          done 

      - name: Execute Agentic Changes
        run: |
          cd target

          curl -g -s -o /dev/null -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -d "⏳ 3/4: OpenClaude is actively refactoring codebase..."

          # 🚀 Tell the agent to write its own commit message
          INSTRUCTION="$USER_PROMPT. After you complete the task, write a concise, professional git commit message summarizing the exact code changes you made. Save this text to a file named 'commit_msg.txt' in the root directory. Do not include markdown formatting in the file."
          
          openclaude -p "$INSTRUCTION" --dangerously-skip-permissions

      - name: Commit and Push
        working-directory: ./target
        run: |
          git config user.name "OpenClaude Agent"
          git config user.email "agent@arnavgr.com"

          git add .

          if git diff-index --quiet HEAD; then
            echo "FINAL_MSG=❌ Finished: OpenClaude made no code changes." >> $GITHUB_ENV
          else
            # 📝 Check if the agent successfully wrote the commit message file
            if [ -f commit_msg.txt ]; then
              echo "Using AI-generated commit message."
              git commit -F commit_msg.txt
              rm commit_msg.txt
            else
              echo "Fallback commit message."
              git commit -m "AI Update: $USER_PROMPT"
            fi
            
            git push origin "$TARGET_BRANCH"
            echo "FINAL_MSG=✅ Done: Changes pushed to $TARGET_BRANCH." >> $GITHUB_ENV
          fi

      - name: Final KV Status Update
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_MSG="${FINAL_MSG:-✅ Done: Job completed successfully.}"
          else
            STATUS_MSG="❌ Failed: OpenClaude crashed. Check GH logs."
          fi
          
          curl -g -s -o /dev/null -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/agent_status" -H "Authorization: Bearer $CF_API_TOKEN" -d "$STATUS_MSG"
